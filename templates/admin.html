<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    background:#eef2f7;
}

/* CARD */
.cadastro-card{
    width:360px;
    padding:35px;
    border-radius:14px;
    background:white;
    box-shadow:0 25px 50px rgba(0,0,0,0.12);
    text-align:center;
}

/* FORM */
form{
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* INPUT */
input{
    padding:12px;
    border-radius:6px;
    border:1px solid #d1d5db;
}

/* BUTTON */
button{
    padding:12px;
    border:none;
    border-radius:6px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* LINK */
.link{
    margin-top:15px;
    font-size:14px;
}

/* MENSAGEM */
.mensagem{
    margin-top:10px;
    font-size:14px;
    color:#16a34a;
}

</style>

</head>

<body>

<div class="cadastro-card">

    <h2>Criar Conta</h2>

    <form method="POST">

        <input 
            type="text" 
            name="nome" 
            placeholder="Nome de usuário"
            required
        >

        <input 
            type="password" 
            name="senha" 
            placeholder="Senha"
            required
        >

        <button type="submit">
            Cadastrar
        </button>

    </form>

    <!-- MENSAGEM -->
    {% if mensagem %}
        <p class="mensagem">{{ mensagem }}</p>
    {% endif %}

    <!-- LINK LOGIN -->
    <div class="link">
        Já tem conta?
        <a href="{{ url_for('login') }}">Entrar</a>
    </div>

</div>

</body>

</html>
