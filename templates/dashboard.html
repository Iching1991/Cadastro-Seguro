<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>
    <h2>Bem-vindo, {{ user.nome }}</h2>
    <a class="logout" href="{{ url_for('logout') }}">Sair</a>
</header>

<div class="container">

<!-- CADASTRO -->
<div class="card">

<h3>Cadastrar Parceiro</h3>

<form method="POST" action="{{ url_for('create_clinic') }}">

<select name="tipo" required>
    <option value="clinica">Clínica</option>
    <option value="veterinario">Veterinário</option>
</select>

<input type="text" name="nome_clinica" placeholder="Nome da clínica">
<input type="text" name="nome_vet" placeholder="Nome do veterinário">

<input type="text" name="responsavel" placeholder="Responsável">

<input type="email" name="email" placeholder="Email" required>
<input type="text" name="telefone" placeholder="Telefone" required>
<input type="text" name="endereco" placeholder="Endereço" required>

<button type="submit">Cadastrar</button>

</form>

</div>

<!-- LISTA -->
<div class="card">

<h3>Parceiros cadastrados</h3>

<table>

<tr>
<th>Nome</th>
<th>Responsável</th>
<th>Tipo</th>
<th>Email</th>
<th>Telefone</th>
</tr>

{% for c in clinics %}
<tr>
<td>{{ c.nome }}</td>
<td>{{ c.responsavel }}</td>
<td>{{ c.tipo }}</td>
<td>{{ c.email }}</td>
<td>{{ c.telefone }}</td>
</tr>
{% endfor %}

</table>

</div>

<!-- ADMIN -->
{% if user.is_owner() %}

<div class="card">

<a href="{{ url_for('admin') }}">
    ⚙️ Gerenciar usuários
</a>

</div>

{% endif %}

</div>

</body>
</html>
